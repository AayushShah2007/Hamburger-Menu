<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mezzatera</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            overflow-x: hidden;
        }

        .menu{
            height: 50px;
            background-color: rgb(18, 18, 96);
            box-shadow: 2px 2px 10px gray;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ham{
            color: white;
            font-size: 20px;
            padding-left: 20px;
            cursor: pointer;
            position: relative;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .ham i{
            margin-right: 10px;
        }

        .option a{
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        .sidebar{
            position: absolute;
            top: 50px;
            left: -200px;
            width: 200px;
            height: calc(100vh - 50px);
            background-color: rgb(208, 113, 25);
            transition: left 0.3s ease;
        }

        .ham:hover .sidebar{
            left: 0;
        }

        .category{
            padding: 15px;
            border-bottom: 2px solid rgba(15, 12, 0, 0.733);
            text-shadow: 2px 2px 5px black;
        }

        .category a{
            color: white;
            text-decoration: none;
            display: block;
        }

        .category:hover{
            background-color: rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

    <div class="menu">

        <div class="ham">
            <i class="fa-solid fa-bars"></i> Mezzatera

            <div class="sidebar">
                <div class="category">
                    <a href="">Home</a>
                </div>

                <div class="category">
                    <a href="">Menu</a>
                </div>

                <div class="category">
                    <a href="">Combo Offers</a>
                </div>

                <div class="category">
                    <a href="">Reserve a Table</a>
                </div>

                <div class="category">
                    <a href="">Reviews</a>
                </div>

                <div class="category">
                    <a href="">About Us</a>
                </div>
            </div>

        </div>

        <div class="option">
            <a href="">Login</a>
            <a href="">Sign Up</a>
        </div>

    </div>

</body>
</html>
